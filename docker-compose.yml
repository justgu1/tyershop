services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${MEDUSA_DB_USER}
      POSTGRES_PASSWORD: ${MEDUSA_DB_PASSWORD}
      POSTGRES_DB: ${MEDUSA_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyershop

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyershop

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    environment:
      COOKIE_SECRET: ${COOKIE_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT}
      AWS_URL: ${AWS_URL}
    ports:
      - "9003:9000"
      - "7001:7001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyershop

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "4321:4321"
    environment:
      PUBLIC_MEDUSA_URL: ${PUBLIC_MEDUSA_URL}
      PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      MEDUSA_INTERNAL_URL: ${MEDUSA_INTERNAL_URL}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyershop

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MEDUSA_URL: ${PUBLIC_MEDUSA_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      NEWSLETTER_FROM: ${NEWSLETTER_FROM}
      NEWSLETTER_TO: ${NEWSLETTER_TO}
    depends_on:
      - backend
    volumes:
      - ./api:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyershop

volumes:
  postgres_data:
  minio_data:

networks:
  tyershop:
    driver: bridge
